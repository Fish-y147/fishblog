baseURL = "https://fishy.us.ci"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Fish's Blog"
theme = "reimu"

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[markup.highlight]
guessSyntax = true
noClasses = false
